<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>

body{
text-align:center;
font-family:Arial;
margin-top:120px;
background-image:url("bartaan.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
color:white;
overflow:hidden;
}

.buttons{
position:relative;
display:inline-block;
margin-top:40px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
position:absolute;
}

#yes{
background:#ff4d6d;
color:white;
left:-120px;
top:0;
}

#no{
background:#28a745;
color:white;
left:0;
top:0;
}

.emoji{
position:fixed;
top:-50px;
font-size:32px;
animation:fall linear;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh);}
}

</style></head><body><h2>Samu! Bhande ghasun zale ka? 😉</h2><div class="buttons">
<button id="yes">Yes 😅</button>
<button id="no">No 😎</button>
</div><script>

const yesBtn=document.getElementById("yes");
const noBtn=document.getElementById("no");

let angle=0;

function moveYes(){

angle+=40;

let x=Math.cos(angle)*100;
let y=Math.sin(angle)*40;

yesBtn.style.transform="translate("+x+"px,"+y+"px)";
}

yesBtn.addEventListener("mouseover",moveYes);
yesBtn.addEventListener("touchstart",moveYes);

noBtn.onclick=function(){

if(navigator.vibrate){
navigator.vibrate(400);
}

let emojis=["🍴","🍽️","🥄"];

for(let i=0;i<20;i++){

setTimeout(()=>{

let e=document.createElement("div");
e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
e.className="emoji";

e.style.left=Math.random()*100+"vw";
e.style.animationDuration=(2+Math.random()*2)+"s";

document.body.appendChild(e);

setTimeout(()=>e.remove(),4000);

},i*100);

}

setTimeout(()=>{
alert("Kai help Karu tuzi 👀🫰🏻");
},1000);

}

</script></body>
</html>
