<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
text-align:center;
font-family:Arial;
margin-top:120px;
background-image:url("bartaan.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
color:white;
overflow:hidden;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
}

#yes{
background:#ff4d6d;
color:white;
position:relative;
}

#no{
background:#28a745;
color:white;
}

.emoji{
position:fixed;
top:-50px;
font-size:30px;
animation:fall linear;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh);}
}

</style>

</head>

<body>

<h2>Samu! Bhande ghasun zale ka? 😏</h2>

<div class="buttons">
<button id="yes">Yes 😅</button>
<button id="no">No 😎</button>
</div>

<script>

const yesBtn=document.getElementById("yes");
const noBtn=document.getElementById("no");

let move=0;

function moveYes(){

move+=40;

if(move>120){
move=-120;
}

yesBtn.style.transform="translateX("+move+"px)";
}

yesBtn.addEventListener("mouseover",moveYes);
yesBtn.addEventListener("touchstart",moveYes);

noBtn.onclick=function(){

let emojis=["🍴","🫡"];

for(let i=0;i<6;i++){

let e=document.createElement("div");

e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

e.className="emoji";

e.style.left=Math.random()*100+"vw";

e.style.animationDuration=(3+Math.random()*2)+"s";

document.body.appendChild(e);

setTimeout(()=>{
e.remove();
},5000);

}

setTimeout(()=>{
alert("Kai help Karu tuzi 👀🫰🏻");
},800);

}

</script>

</body>
</html>
