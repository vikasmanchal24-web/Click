<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>

body{
text-align:center;
font-family:Arial;
margin-top:150px;
background-image:url("bartan.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
color:white;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
position:relative;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
}

#yes{
background:#ff4d6d;
color:white;
position:relative;
}

#no{
background:#28a745;
color:white;
}

</style></head><body><h2>Samu! Bhande ghasun zale ka? 😏</h2><div class="buttons">
<button id="yes">Yes 😅</button>
<button id="no">No 😎</button>
</div><script>

const yesBtn=document.getElementById("yes");
const noBtn=document.getElementById("no");

let angle=0;

function moveYes(){
angle+=30;

let x=Math.cos(angle)*60;
let y=Math.sin(angle)*20;

yesBtn.style.transform="translate("+x+"px,"+y+"px)";
}

yesBtn.addEventListener("mouseover",moveYes);
yesBtn.addEventListener("touchstart",moveYes);

noBtn.onclick=function(){

let emojis=["🍴","🫡"];

for(let i=0;i<7;i++){

let e=document.createElement("div");
e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
e.className="emoji";

e.style.left=Math.random()*100+"vw";
e.style.animationDuration=(3+Math.random()*2)+"s";

document.body.appendChild(e);

setTimeout(()=>e.remove(),5000);

}

setTimeout(()=>{
alert("Kai help Karu tuzi 👀🫰🏻");
},800);

}

</script></body>
</html>
