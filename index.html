<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>

body{
text-align:center;
font-family:Arial;
margin-top:150px;
background-image:url("bartan.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
color:white;
overflow:hidden;
}

button{
padding:15px 30px;
font-size:18px;
margin:20px;
border:none;
border-radius:10px;
}

#yes{
background:#ff4d6d;
color:white;
position:absolute;
}

#no{
background:#28a745;
color:white;
}

#msg{
margin-top:30px;
font-size:24px;
font-weight:bold;
}

</style></head><body><h2>Samu! Bhande ghasun zale ka? 😏</h2><button id="yes">Yes 😅</button>
<button id="no">No 😎</button>

<div id="msg"></div><script>

const yesBtn=document.getElementById("yes");
const noBtn=document.getElementById("no");
const msg=document.getElementById("msg");

function moveYes(){
let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;
yesBtn.style.left=x+"px";
yesBtn.style.top=y+"px";
}

yesBtn.addEventListener("mouseover",moveYes);
yesBtn.addEventListener("touchstart",moveYes);

noBtn.onclick=function(){
msg.innerHTML="Kai help Karu tuzi 👀🫰🏻";
}

</script></body>
</html>
